<html lang="en">

<title>The Word 365 Pro</title>

<style>
:root{--blue:#3a7bd5;--blue-light:#eef4fc;--blue-mid:#5a8bd8;--cream:#fdf6ee;--cream-mid:#f2e4cc;--cream-dark:#e8d0aa;--gold:#c9963a;--gold-light:#e8b86d;--gold-pale:#f5e0bb;--amber:#e07b2a;--brown:#2a1810;--brown-mid:#5a3828;--brown-soft:#8a6858;--white:#fff;--font-size:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'EB Garamond',Georgia,serif;font-size:var(--font-size);background:var(--cream);color:var(--brown);min-height:100vh;overflow-x:hidden}
#splash{position:fixed;inset:0;z-index:2000;background:linear-gradient(160deg,var(--blue) 0%,#1a4a9a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease}
.splash-cross{font-size:3rem;color:var(--gold-light);animation:pulse 2s infinite;margin-bottom:1rem}
.splash-title{font-family:'Cinzel',serif;font-size:clamp(2rem,8vw,3.5rem);color:var(--white);letter-spacing:0.18em}
.splash-pro{font-family:'Cinzel',serif;font-size:0.75rem;color:var(--gold-light);letter-spacing:0.4em;margin-top:0.3rem}
.splash-bar{width:180px;height:2px;background:rgba(255,255,255,0.2);border-radius:2px;margin-top:2rem;overflow:hidden}
.splash-fill{height:100%;width:0;background:var(--gold-light);animation:load 2.2s ease forwards}
@keyframes load{to{width:100%}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(1.08)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#theme-selector{display:none;position:fixed;inset:0;z-index:1900;background:var(--cream);flex-direction:column;align-items:center;justify-content:center;padding:2rem;animation:fadeIn 0.5s ease}
#theme-selector.visible{display:flex}
.theme-sel-title{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--blue);text-align:center;margin-bottom:0.4rem;letter-spacing:0.1em}
.theme-sel-sub{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--brown-soft);font-style:italic;text-align:center;margin-bottom:2rem}

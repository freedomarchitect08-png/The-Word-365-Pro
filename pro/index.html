<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Go Pro</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 32px 24px;
  max-width: 420px;
  width: 100%;
  backdrop-filter: blur(20px);
}
h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  color: #94a3b8;
  text-align: center;
  margin-bottom: 28px;
  font-size: 15px;
}
.features {
  list-style: none;
  margin-bottom: 28px;
}
.features li {
  padding: 10px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 15px;
  color: #e2e8f0;
}
.features li::before {
  content: "✓";
  color: #22c55e;
  font-weight: bold;
  font-size: 18px;
}
.plan-btn {
  width: 100%;
  padding: 18px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s ease;
}
.plan-btn:hover {
  border-color: #6366f1;
  background: rgba(99,102,241,0.1);
  transform: translateY(-1px);
}
.plan-btn.annual {
  border-color: #6366f1;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  position: relative;
}
.plan-btn.annual:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 30px rgba(99,102,241,0.4);
}
.badge {
  position: absolute;
  top: -10px;
  right: 16px;
  background: #22c55e;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 10px;
  letter-spacing: 0.5px;
}
.plan-info { text-align: left; }
.plan-name { font-size: 16px; font-weight: 600; }
.plan-sub { font-size: 12px; color: #cbd5e1; margin-top: 2px; }
.plan-price { font-size: 20px; font-weight: 700; }
.cancel-note {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 16px;
  line-height: 1.6;
}
.cancel-note a { color: #818cf8; text-decoration: none; }
.active-banner {
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  text-align: center;
}
.active-banner strong { color: #22c55e; }
.cancel-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(239,68,68,0.3);
  background: rgba(239,68,68,0.1);
  color: #fca5a5;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
.cancel-btn:hover { background: rgba(239,68,68,0.2); }
.hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div id="activeView" class="hidden">
    <h1>You're Pro!</h1>
    <p class="subtitle">Thanks for supporting us.</p>
    <div class="active-banner">
      Current plan: <strong id="currentPlan">—</strong><br/>
      <span id="renewInfo" style="font-size:12px;color:#94a3b8;"></span>
    </div>
    <button class="cancel-btn" onclick="cancelSubscription()">Cancel Subscription</button>
  </div>

  <div id="plansView">
    <h1>Go Pro</h1>
    <p class="subtitle">Unlock everything. Cancel anytime.</p>
    <ul class="features">
      <li>Unlimited access to all features</li>
      <li>Priority support</li>
      <li>No ads</li>
      <li>Early access to new updates</li>
    </ul>

    <button class="plan-btn" onclick="subscribe('monthly')">
      <div class="plan-info">
        <div class="plan-name">Monthly</div>
        <div class="plan-sub">Billed every month</div>
      </div>
      <div class="plan-price">$6.99</div>
    </button>

    <button class="plan-btn annual" onclick="subscribe('annual')">
      <span class="badge">SAVE 40%</span>
      <div class="plan-info">
        <div class="plan-name">Annual</div>
        <div class="plan-sub">$4.17/mo · billed yearly</div>
      </div>
      <div class="plan-price">$49.99</div>
    </button>

    <p class="cancel-note">
      Subscriptions auto-renew. Cancel anytime from this page.<br/>
      By subscribing, you agree to our <a href="#">Terms</a>.
    </p>
  </div>
</div>

<script>
const KEY = 'pro_subscription';

function loadSub() {
  try { return JSON.parse(localStorage.getItem(KEY)); } catch { return null; }
}

function render() {
  const sub = loadSub();
  const active = document.getElementById('activeView');
  const plans = document.getElementById('plansView');
  if (sub && sub.status === 'active') {
    active.classList.remove('hidden');
    plans.classList.add('hidden');
    document.getElementById('currentPlan').textContent =
      sub.plan === 'annual' ? 'Annual ($49.99/yr)' : 'Monthly ($6.99/mo)';
    const renew = new Date(sub.renewsAt).toLocaleDateString();
    document.getElementById('renewInfo').textContent = 'Renews on ' + renew;
  } else {
    active.classList.add('hidden');
    plans.classList.remove('hidden');
  }
}

function subscribe(plan) {
  const now = new Date();
  const renewsAt = new Date(now);
  if (plan === 'annual') renewsAt.setFullYear(now.getFullYear() + 1);
  else renewsAt.setMonth(now.getMonth() + 1);
  localStorage.setItem(KEY, JSON.stringify({
    plan,
    status: 'active',
    startedAt: now.toISOString(),
    renewsAt: renewsAt.toISOString(),
  }));
  alert('Welcome to Pro! Your ' + plan + ' plan is now active.');
  render();
}

function cancelSubscription() {
  if (!confirm('Cancel your Pro subscription? You will lose access immediately.')) return;
  localStorage.removeItem(KEY);
  alert('Your subscription has been cancelled.');
  render();
}

render();
</script>
</body>
</html>
